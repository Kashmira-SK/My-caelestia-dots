# MONITOR
monitor = , preferred, auto, 1

# PROGRAMS
$terminal    = kitty
$fileManager = nautilus

# AUTOSTART
exec-once = caelestia shell -d
exec-once = nm-applet
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpaper
#exec-once = hypridle
exec-once = cliphist
exec-once = sleep 3 && kbuildsycoca6 --noincremental
exec-once = udiskie
exec-once = kitty --class kitty-scratch
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = kdeconnectd

# ENV
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_MENU_PREFIX,arch-

# GENERAL
general {
    gaps_in = 4
    gaps_out = 7
    border_size = 1
    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(ffffff20)
    resize_on_border = true
    layout = dwindle
}

# DECORATION
decoration {
    rounding = 6
    rounding_power = 2
    active_opacity = 0.9
    inactive_opacity = 0.8
    #dim_inactive = false       # Adds a slight dark tint to background windows
    #dim_strength = 0
    shadow {
        enabled = true
        range = 40
        render_power = 4
        color = rgba(00000099)
    }
    blur {
        enabled = false
        size = 2
        passes = 2
        vibrancy = 0.2
        vibrancy_darkness = 0
        contrast = 1
        brightness = 1
        popups = true
        noise = 0
    }
}

# ANIMATIONS
animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = spring, 0.05, 0.9, 0.1, 1.05

    animation = global, 1, 10, default
    animation = border, 1, 5, easeOutQuint

    animation = windows, 1, 4, easeOutQuint
    animation = windowsIn, 1, 4, spring, popin 80%
    animation = windowsOut, 1, 1.5, linear, popin 90%

    animation = fade, 1, 3, quick
    animation = layers, 1, 4, easeOutQuint

    animation = workspaces, 1, 3, easeOutQuint, slidevert

    animation = specialWorkspace, 0, 1, default, fade
}

# LAYOUTS
dwindle {
    pseudotile = true
    preserve_split = true
}
master {
    new_status = master
}

# MISC
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# INPUT
input {
    kb_layout = us
    sensitivity = 0
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}
gesture = 3, horizontal, workspace

# KEYBINDS
$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = $mainMod, E, exec, nautilus
bind = $mainMod, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, B, exec, firefox
bind = $mainMod, X, exec, caelestia shell drawers toggle notes
bind = $mainMod, SPACE, exec, caelestia shell drawers toggle launcher
bind = $mainMod, A, exec, caelestia shell drawers toggle dashboard
bind = $mainMod, Z, exec, caelestia shell drawers toggle session
bind = $mainMod, L, exec, caelestia shell lock lock
bind = $mainMod, N, exec, caelestia shell drawers toggle sidebar
bind = $mainMod, T, exec, caelestia shell drawers toggle bar
bind = $mainMod, D, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = $mainMod, Slash, exec, /home/kashmira/.local/bin/combo-pick
bind = $mainMod, equal, exec, /home/kashmira/.local/bin/emoji-pick
bind = $mainMod, P, exec, grimblast copy area
bind = , Print, exec, grimblast save area ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, W, togglespecialworkspace, term
bind = $mainMod SHIFT, W, movetoworkspace, special:term
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# WINDOW RULES
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
windowrule {
    name = scratch-term
    match:class = kitty-scratch
    workspace = special:term
}
